<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChordsBuddy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="fretboard" id="fretboard"></div>

    <div class="ui-layer top-0 p-4 flex flex-col items-center gap-3">
        <div class="glass-card w-full max-w-lg flex justify-between items-center px-6">
            <div class="flex items-center gap-6">
                <img id="chord-img" src="" class="ref-img" alt="Chord">
                <div>
                    <h1 id="chord-name" class="text-2xl font-black text-white italic tracking-tight uppercase">LOADING...</h1>
                    <p id="status" class="text-[11px] text-gray-400 uppercase tracking-widest font-bold">Initializing...</p>
                </div>
            </div>
            <button onclick="skipChord()" class="bg-indigo-600 text-white text-[12px] px-5 py-2 rounded-full font-bold hover:bg-indigo-500 transition">SKIP</button>
        </div>
    </div>

    <div class="ui-layer bottom-0 mb-8 flex justify-center">
        <div id="strum-pad" class="glass-card strum-area">
            STRUM TO PLAY
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
